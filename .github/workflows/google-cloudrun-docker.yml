# This workflow builds and deploys a Go application to Google Cloud Run.
#
# To use this workflow, you must set up the following secrets in your GitHub repository:
#
# - WIF_PROVIDER: The full identifier of the Workload Identity Provider.
# - WIF_SERVICE_ACCOUNT: The email of the service account for Workload Identity Federation.
# - WIF_SERVICE_ACCOUNT_DEV: The email of the dev service account.
# - WIF_SERVICE_ACCOUNT_TEST: The email of the test service account.

name: Build and Deploy to Google Cloud Run

on:
  push:
    branches: ["main", "dev", "test"]
  pull_request:
    branches: ["main", "dev"]
  workflow_dispatch:

env:
  PROJECT_ID: sbcwaste
  GAR_LOCATION: europe-west1
  REPO: eu-docker-repo
  IMAGE: sbcwaste
  REGION: europe-west1

jobs:
  validate-static-assets:
    name: Validate Static Assets (HTML/CSS)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate HTML and CSS
        uses: Cyb3r-Jak3/html5validator-action@v7.2.0
        with:
          root: static/
          css: true
          extra: "--no-langdetect"

  validate-js:
    name: Validate JavaScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run npm install
        run: npm install
      - name: Run npx eslint static/script.js static/costs.js
        run: npx eslint static/script.js static/costs.js

  trivy-fs-scan:
    name: Scan code for vulnerabilities (Trivy FS)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Scan code for vulnerabilities
        uses: aquasecurity/trivy-action@0.20.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true

  gosec:
    name: Run Gosec Security Scanner
    runs-on: ubuntu-latest
    container:
      image: golang:1.25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Run Gosec Security Scanner
        run: gosec -exclude=G104,G304,G307 ./src/...

  govulncheck:
    name: Run govulncheck
    runs-on: ubuntu-latest
    container:
      image: golang:1.25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run govulncheck
        working-directory: src
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          govulncheck -scan=module ./...

  unit-tests:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    container:
      image: golang:1.25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run tests
        working-directory: src
        run: go test ./...

  build:
    name: Build and Push Image
    needs: [validate-static-assets, validate-js, trivy-fs-scan, gosec, govulncheck, unit-tests]
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/test')
    outputs:
      image: ${{ steps.set_image.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:${{ github.sha }} .

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev --quiet

      - name: Push Docker image
        id: set_image
        run: |
          docker push ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:${{ github.sha }}
          echo "image=${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"

  build-pr:
    name: Build and Push Image
    needs: [validate-static-assets, validate-js, trivy-fs-scan, gosec, govulncheck, unit-tests]
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    outputs:
      image: ${{ steps.set_image.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:${{ github.sha }} .

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev --quiet

      - name: Push Docker image
        id: set_image
        run: |
          docker push ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:${{ github.sha }}
          echo "image=${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"

  trivy-image-scan:
    name: Scan image for vulnerabilities (Trivy Image)
    needs: [build, build-pr]
    runs-on: ubuntu-latest
    if: always() && (needs.build.result == 'success' || needs.build-pr.result == 'success')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image locally (for PRs)
        if: github.event_name == 'pull_request' && needs.build.result == 'skipped'
        run: |
          docker build -t ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:${{ github.sha }} .

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev --quiet

      - name: Pull Docker image
        run: |
          docker pull ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:${{ github.sha }}

      - name: Verify image availability or auth token
        run: |
          docker inspect ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:${{ github.sha }}

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:${{ github.sha }}
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true

  gcp-vulnerability-check:
    name: Check for vulnerabilities in Artifact Registry
    needs: [build, build-pr]
    runs-on: ubuntu-latest
    if: always() && (needs.build.result == 'success' || needs.build-pr.result == 'success') && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/test')
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Poll for scan results
        run: |
          IMAGE="${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:${{ github.sha }}"
          echo "Polling GCP for vulnerability scan results on: $IMAGE"

          for i in {1..10}; do
            SCAN_STATUS=$(gcloud artifacts docker images describe "$IMAGE" \
              --project="${{ env.PROJECT_ID }}" \
              --show-package-vulnerability \
              --format=json 2>/dev/null | \
              python3 -c "
import json, sys
data = json.load(sys.stdin)
results = data.get('package_vulnerability_summary', {})
status = results.get('vulnerabilities', {}).get('status', 'SCANNING')
critical = results.get('vulnerabilities', {}).get('CRITICAL', 0)
high = results.get('vulnerabilities', {}).get('HIGH', 0)
print(f'{status},{critical},{high}')
" 2>/dev/null || echo "SCANNING,0,0")

            STATUS=$(echo "$SCAN_STATUS" | cut -d',' -f1)
            CRITICAL=$(echo "$SCAN_STATUS" | cut -d',' -f2)
            HIGH=$(echo "$SCAN_STATUS" | cut -d',' -f3)

            echo "Attempt $i: Status=$STATUS, Critical=$CRITICAL, High=$HIGH"

            if [ "$STATUS" != "SCANNING" ]; then
              if [ "$CRITICAL" -gt 0 ] || [ "$HIGH" -gt 0 ]; then
                echo "ERROR: Found $CRITICAL CRITICAL and $HIGH HIGH vulnerabilities."
                exit 1
              else
                echo "No CRITICAL or HIGH vulnerabilities found."
                exit 0
              fi
            fi

            if [ $i -lt 10 ]; then
              sleep 30
            fi
          done

          echo "Scan did not complete in time."
          exit 1

  deploy:
    name: Deploy to Cloud Run
    needs: [build, trivy-image-scan, gcp-vulnerability-check]
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/test')
    steps:
      - name: Set up deployment environment
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "SERVICE_NAME=sbcwaste-prod" >> $GITHUB_ENV
            echo "WIF_SA=${{ secrets.WIF_SERVICE_ACCOUNT }}" >> $GITHUB_ENV
          elif [[ "${{ github.ref }}" == "refs/heads/dev" ]]; then
            echo "SERVICE_NAME=sbcwaste-dev" >> $GITHUB_ENV
            echo "WIF_SA=${{ secrets.WIF_SERVICE_ACCOUNT_DEV }}" >> $GITHUB_ENV
          elif [[ "${{ github.ref }}" == "refs/heads/test" ]]; then
            echo "SERVICE_NAME=sbcwaste-test" >> $GITHUB_ENV
            echo "WIF_SA=${{ secrets.WIF_SERVICE_ACCOUNT_TEST }}" >> $GITHUB_ENV
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SA }}

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:${{ github.sha }}
          flags: '--platform=managed --allow-unauthenticated'
          env_vars: |
            APP_ENV=production

      - name: Verify Application Health
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} --platform managed --region ${{ env.REGION }} --format 'value(status.url)')
          echo "Service URL: $SERVICE_URL"

          success=false
          for i in {1..10}; do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${SERVICE_URL}/health" || echo "000")
            echo "Attempt $i: HTTP status $HTTP_STATUS"
            if [ "$HTTP_STATUS" -eq 200 ]; then
              echo "Health check passed on attempt $i."
              success=true
              break
            fi
            sleep 30
          done

          if [ "$root_success" != "true" ]; then
            echo "Health check on root path failed after several attempts."
            exit 1
          fi

  cleanup-images:
    name: Clean up old container images
    needs: deploy
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/test')
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Set Google Cloud project
        run: gcloud config set project ${{ env.PROJECT_ID }}

      - name: Clean up old images
        run: |
          echo "Identifying images to clean up in ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}"

          # Function to get the canonical image URI (with digest) from a Cloud Run service
          get_deployed_image_uri() {
            local service_name=$1
            local image_url=""
            local image_digest=""
            local canonical_uri=""

            image_url=$(gcloud run services describe "$service_name" --platform managed --region "${{ env.REGION }}" --project="${{ env.PROJECT_ID }}" --format='value(spec.template.spec.containers[0].image)' 2>/dev/null)

            if [ -n "$image_url" ]; then
              image_digest=$(gcloud artifacts docker images describe "$image_url" --project="${{ env.PROJECT_ID }}" --format='value(image_summary.digest)' 2>/dev/null)
              if [ -n "$image_digest" ]; then
                canonical_uri="${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}@${image_digest}"
                echo "$canonical_uri"
              fi
            fi
          }

          prod_image=$(get_deployed_image_uri "sbcwaste-prod")
          dev_image=$(get_deployed_image_uri "sbcwaste-dev")
          test_image=$(get_deployed_image_uri "sbcwaste-test")

          echo "Currently deployed images (canonical URI):"
          echo "Prod: ${prod_image:-'not found'}"
          echo "Dev: ${dev_image:-'not found'}"
          echo "Test: ${test_image:-'not found'}"

          # Get all image URIs for the service, sorted from newest to oldest.
          all_images=$(gcloud artifacts docker images list "${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}" \
            --project="${{ env.PROJECT_ID }}" \
            --filter="package='${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}'" \
            --sort-by="~CREATE_TIME" \
            --format="json" | \
            jq -r '.[] | .version' 2>/dev/null) || all_images=""

          if [ -z "$all_images" ]; then
            echo "No images found for this service. Nothing to do."
            exit 0
          fi

          # Build keep list as bare digests only (all_images contains bare digests)
          # Deployed image URIs are in the form "…@sha256:xxx"; extract just the digest part.
          keep_digests=()
          for uri in "$prod_image" "$dev_image" "$test_image"; do
            [ -n "$uri" ] && keep_digests+=("${uri##*@}")
          done

          # Add the 5 most recent image digests to the keep list
          keep_digests+=($(echo "$all_images" | head -n 5))

          # Create a unique, sorted list of digests to keep
          unique_keep_digests=$(printf "%s\n" "${keep_digests[@]}" | sort -u)

          echo "---"
          echo "Digests to keep:"
          echo "$unique_keep_digests"
          echo "---"

          # Find bare digests that are not in the keep list.
          delete_list=$(echo "$all_images" | grep -vFx -f <(echo "$unique_keep_digests") || true)

          if [ -n "$delete_list" ]; then
            echo "The following digests will be deleted:"
            echo "$delete_list"
            IMAGE_BASE="${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}"
            # gcloud accepts one image per invocation; loop to avoid "unrecognized arguments" error.
            while IFS= read -r digest; do
              gcloud artifacts docker images delete "${IMAGE_BASE}@${digest}" --delete-tags -q
            done <<< "$delete_list"
          else
            echo "No images to delete."
          fi
